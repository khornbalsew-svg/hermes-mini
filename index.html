<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hermes Mini</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f13; --surface: #18181e; --surface2: #22222b; --surface3: #2a2a35;
    --border: #2e2e3a; --text: #e8e8ed; --text2: #9a9aa8;
    --accent: #7c5cfc; --accent-hover: #6a4ae8; --accent-dim: rgba(124,92,252,0.15);
    --danger: #ef4444;
    --radius: 10px; --radius-sm: 6px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --sidebar-w: 260px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font:14px/1.5 var(--font);overflow:hidden;}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .app{display:flex;height:100%;}
  .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .sidebar-header h1{font-size:16px;font-weight:600;letter-spacing:-0.3px;}
  .sidebar-header .logo{width:22px;height:22px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .session-list{flex:1;overflow-y:auto;padding:6px 8px;}
  .session-item{padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;margin-bottom:2px;}
  .session-item:hover{background:var(--surface2);}
  .session-item.active{background:var(--accent-dim);border-left:2px solid var(--accent);}
  .session-item .icon{font-size:16px;flex-shrink:0;}
  .session-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;}
  .session-item .del{opacity:0;background:none;border:none;color:var(--text2);cursor:pointer;padding:2px 4px;font-size:14px;border-radius:4px;}
  .session-item:hover .del{opacity:1;}
  .session-item .del:hover{color:var(--danger);background:rgba(239,68,68,0.15);}
  .sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);}
  .btn-new{width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;transition:all .15s;}
  .btn-new:hover{background:var(--surface3);border-color:var(--accent);}
  .chat-header{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);}
  .chat-header .info{display:flex;align-items:center;gap:10px;min-width:0;}
  .chat-header .title{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;}
  .msg{max-width:85%;padding:10px 14px;border-radius:var(--radius);line-height:1.55;white-space:pre-wrap;word-wrap:break-word;font-size:13.5px;}
  .msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
  .msg.assistant{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;}
  .msg.system{align-self:center;background:var(--surface3);color:var(--text2);font-size:12px;border-radius:20px;padding:5px 14px;max-width:90%;}
  .msg .time{font-size:10px;opacity:0.5;margin-top:4px;text-align:right;}
  .msg.typing{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;display:flex;gap:4px;padding:12px 16px;}
  .msg.typing span{width:6px;height:6px;border-radius:50%;background:var(--text2);animation:bounce 1.4s infinite;}
  .msg.typing span:nth-child(2){animation-delay:.2s;}
  .msg.typing span:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text2);}
  .empty-state .big-icon{font-size:48px;opacity:0.3;}
  .input-bar{padding:10px 16px 12px;border-top:1px solid var(--border);background:var(--surface);}
  .input-row{display:flex;gap:8px;align-items:flex-end;}
  .input-row textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 14px;font:14px/1.4 var(--font);resize:none;min-height:40px;max-height:120px;outline:none;transition:border .15s;}
  .input-row textarea:focus{border-color:var(--accent);}
  .input-row textarea::placeholder{color:var(--text2);}
  .btn-send{width:40px;height:40px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
  .btn-send:hover{background:var(--accent-hover);}
  .btn-send:disabled{opacity:0.4;cursor:not-allowed;}
  .settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;}
  .settings-overlay.open{display:flex;}
  .settings-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:380px;max-width:90vw;max-height:80vh;overflow-y:auto;}
  .settings-panel h2{font-size:16px;margin-bottom:16px;}
  .settings-panel label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;margin-top:12px;}
  .settings-panel input{width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font:13px var(--font);outline:none;}
  .settings-panel input:focus{border-color:var(--accent);}
  .settings-panel .btn-row{display:flex;gap:8px;margin-top:16px;}
  .settings-panel .btn-row button{flex:1;padding:8px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:13px;}
  .settings-panel .btn-save{background:var(--accent);color:#fff;}
  .settings-panel .btn-save:hover{background:var(--accent-hover);}
  .settings-panel .btn-cancel{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 20px;font-size:13px;z-index:200;display:none;max-width:90vw;}
  .toast.show{display:block;animation:fadeIn .2s;}
  @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1}}
  @media(max-width:600px){.sidebar{display:none;}.sidebar.open{display:flex;position:fixed;inset:0;z-index:50;width:100%;}.msg{max-width:92%;}.sidebar-toggle{display:block;}}
  .sidebar-toggle{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="logo">H</div><h1>Hermes</h1></div>
    <div class="session-list" id="sessionList"></div>
    <div class="sidebar-footer"><button class="btn-new" onclick="newSession()">+ New Session</button></div>
  </div>
  <div class="main">
    <div class="chat-header">
      <div class="info">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <span class="title" id="chatTitle">Select a session</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-size:12px;color:var(--text2);" id="modelLabel"></span>
        <button style="background:none;border:none;color:var(--text2);cursor:pointer;padding:4px 8px;font-size:15px;" onclick="openSettings()" title="Settings">⚙️</button>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state"><div class="big-icon">💬</div><p>Open Settings (⚙️) → set API URL + Key → Save</p></div>
    </div>
    <div class="input-bar">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Message Hermes..." onkeydown="onInputKeydown(event)" disabled></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
      </div>
    </div>
  </div>
</div>
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h2>⚙️ Settings</h2>
    <label>Hermes API URL</label>
    <input id="apiUrlInput" value="http://localhost:8642" placeholder="http://localhost:8642">
    <label>API Key</label>
    <input id="apiKeyInput" placeholder="API_SERVER_KEY from .env">
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── State ──
const state = {
  apiUrl: localStorage.getItem('hermes_api_url') || '',
  apiKey: localStorage.getItem('hermes_api_key') || '',
  sessionId: null,
  sessions: [],
  loading: false,
};

// ── Telegram WebApp ──
let tg = null;
try { if (window.Telegram && window.Telegram.WebApp) { tg = window.Telegram.WebApp; tg.expand(); tg.ready(); } } catch(e) {}

const $ = id => document.getElementById(id);
const messagesEl = $('messages'), input = $('input'), sendBtn = $('sendBtn');
const sessionList = $('sessionList'), chatTitle = $('chatTitle'), toastEl = $('toast');
const modelLabel = $('modelLabel');

let toastTimer = null;
function toast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// ── API ──
async function api(path, opts = {}) {
  const url = state.apiUrl.replace(/\/+$/, '') + path;
  const headers = { 'Content-Type': 'application/json' };
  if (state.apiKey) headers['Authorization'] = 'Bearer ' + state.apiKey;
  const res = await fetch(url, { ...opts, headers: { ...headers, ...opts.headers } });
  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const d = await res.json(); msg = d.error?.message || d.detail || msg; } catch(e) {}
    throw new Error(msg);
  }
  return res;
}

// ── Sessions ──
async function loadSessions() {
  if (!state.apiUrl) return;
  try {
    const res = await api('/api/sessions');
    const data = await res.json();
    // API returns {object: "list", data: [{id, source, model, title, ...}]}
    const items = data.data || data.sessions || data || [];
    state.sessions = (Array.isArray(items) ? items : []).filter(s => s.id);
    renderSessions();
  } catch(e) {
    console.error('sessions:', e.message);
    state.sessions = [];
    renderSessions();
  }
}

function renderSessions() {
  if (!state.sessions.length) {
    sessionList.innerHTML = '<div style="padding:12px;color:var(--text2);font-size:12px;text-align:center;">No sessions<br>or check Settings</div>';
    return;
  }
  sessionList.innerHTML = state.sessions.map(s => {
    const active = s.id === state.sessionId ? 'active' : '';
    const name = s.title || s.id.slice(0, 12);
    return `<div class="session-item ${active}" onclick="selectSession('${s.id}')">
      <span class="icon">💬</span>
      <span class="name">${esc(name)}</span>
      <button class="del" onclick="event.stopPropagation(); deleteSession('${s.id}')">✕</button>
    </div>`;
  }).join('');
}

async function selectSession(id) {
  state.sessionId = id;
  const s = state.sessions.find(x => x.id === id);
  chatTitle.textContent = s?.title || s?.id?.slice(0,12) || 'Chat';
  modelLabel.textContent = s?.model || '';
  renderSessions();
  input.disabled = false; sendBtn.disabled = false; input.focus();
  await loadMessages(id);
}

async function newSession() {
  try {
    const res = await api('/api/sessions', { method: 'POST' });
    const data = await res.json();
    const sid = data.id || data.session_id;
    if (sid) {
      state.sessions.unshift({ id: sid, title: 'New Session' });
      renderSessions(); await selectSession(sid); toast('New session created');
    }
  } catch(e) { toast('Create failed: ' + e.message); }
}

async function deleteSession(id) {
  try {
    await api(`/api/sessions/${encodeURIComponent(id)}`, { method: 'DELETE' });
    state.sessions = state.sessions.filter(s => s.id !== id);
    if (state.sessionId === id) {
      state.sessionId = null; chatTitle.textContent = 'Select a session';
      messagesEl.innerHTML = '<div class="empty-state"><div class="big-icon">💬</div><p>Select a session</p></div>';
      input.disabled = true; sendBtn.disabled = true;
    }
    renderSessions(); toast('Deleted');
  } catch(e) { toast('Delete failed: ' + e.message); }
}

// ── Messages ──
async function loadMessages(id) {
  try {
    messagesEl.innerHTML = '<div class="empty-state"><div class="big-icon">⏳</div><p>Loading...</p></div>';
    const res = await api(`/api/sessions/${encodeURIComponent(id)}/messages`);
    const data = await res.json();
    const msgs = data.messages || data.data || data;
    renderMessages(Array.isArray(msgs) ? msgs : []);
  } catch(e) {
    messagesEl.innerHTML = `<div class="empty-state"><div class="big-icon">⚠️</div><p>${esc(e.message)}</p></div>`;
  }
}

function renderMessages(msgs) {
  if (!msgs.length) {
    messagesEl.innerHTML = '<div class="empty-state"><div class="big-icon">💬</div><p>Start a conversation</p></div>';
    return;
  }
  messagesEl.innerHTML = msgs.map(m => {
    const role = (m.role || 'user').toLowerCase();
    const content = m.content || '';
    const time = m.created_at ? new Date(m.created_at*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="msg ${role}">${esc(content)}${time ? `<div class="time">${time}</div>` : ''}</div>`;
  }).join('');
  scrollBottom();
}

function scrollBottom() { requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }); }

// ── Send ──
async function sendMessage() {
  const text = input.value.trim();
  if (!text || !state.sessionId || state.loading) return;
  messagesEl.querySelector('.empty-state')?.remove();
  appendMsg('user', text);
  input.value = ''; input.style.height = 'auto';
  state.loading = true; sendBtn.disabled = true; input.disabled = true;

  const typingEl = document.createElement('div');
  typingEl.className = 'msg typing';
  typingEl.innerHTML = '<span></span><span></span><span></span>';
  typingEl.id = 'typingIndicator';
  messagesEl.appendChild(typingEl);
  scrollBottom();

  let fullContent = '';
  try {
    const url = state.apiUrl.replace(/\/+$/, '') + `/api/sessions/${encodeURIComponent(state.sessionId)}/chat/stream`;
    const headers = { 'Content-Type': 'application/json' };
    if (state.apiKey) headers['Authorization'] = 'Bearer ' + state.apiKey;

    const resp = await fetch(url, { method: 'POST', headers, body: JSON.stringify({ message: text }) });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    typingEl.remove();
    const msgEl = document.createElement('div');
    msgEl.className = 'msg assistant';
    msgEl.id = 'streamMsg';
    messagesEl.appendChild(msgEl);
    scrollBottom();

    if (resp.headers.get('content-type')?.includes('text/event-stream')) {
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n')) {
          if (line.startsWith('data: ')) {
            const d = line.slice(6);
            if (d === '[DONE]') break;
            try {
              const p = JSON.parse(d);
              const delta = p.choices?.[0]?.delta?.content || p.content || '';
              fullContent += delta;
              msgEl.textContent = fullContent;
              scrollBottom();
            } catch(e) {}
          }
        }
      }
    } else {
      const data = await resp.json();
      fullContent = data.content || data.message?.content || JSON.stringify(data);
      msgEl.textContent = fullContent;
    }
  } catch(e) {
    typingEl.remove();
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
      appendMsg('system', '⚠️ Cannot reach API. Check settings (⚙️).');
    } else {
      appendMsg('system', '⚠️ ' + e.message);
    }
  } finally {
    state.loading = false; sendBtn.disabled = false; input.disabled = false; input.focus();
  }
}

function appendMsg(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role; div.textContent = content;
  messagesEl.appendChild(div); scrollBottom();
}

function esc(t) { const d = document.createElement('div'); d.textContent = t ?? ''; return d.innerHTML; }

function onInputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  e.target.style.height = 'auto';
  e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

// ── Settings ──
function openSettings() {
  $('apiUrlInput').value = state.apiUrl;
  $('apiKeyInput').value = state.apiKey;
  $('settingsOverlay').classList.add('open');
}
function closeSettings() { $('settingsOverlay').classList.remove('open'); }
function saveSettings() {
  state.apiUrl = $('apiUrlInput').value.trim();
  state.apiKey = $('apiKeyInput').value.trim();
  localStorage.setItem('hermes_api_url', state.apiUrl);
  localStorage.setItem('hermes_api_key', state.apiKey);
  closeSettings(); toast('Saved');
  loadSessions();
}

// ── Init ──
async function init() {
  if (state.apiUrl) {
    await loadSessions();
    if (state.sessions.length > 0) {
      await selectSession(state.sessions[0].id);
    }
  }
  if (tg) console.log('Telegram Mini App ready');
}
init();
</script>
</body>
</html>
